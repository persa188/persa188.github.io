<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Personal Site" />
    <title>Daniel</title>
    <link rel="icon" href="/favicon.ico">
    
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.2.0/css/all.css" integrity="sha384-hWVjflwFxL6sNzntih27bfxkr27PmbbK/iSvJ+a4+0owXq79v+lsFkW54bOGbiDQ" crossorigin="anonymous">

    <style>
        html, body {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          scroll-behavior: smooth;
        }

        body {
          min-height: 100vh;
          width: 100%;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
          background: #1a1a1a;
        }

        .container {
          display: flex;
          min-height: 100vh;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          /* FIXED: Removed the trailing comma after linear-gradient context */
          background: #1a1a1a linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)) url('/imgs/bg-min.avif') no-repeat center center;
          background-size: cover;
          width: 100%;
        }

        .wh { color: #FFF; }

        h1 { 
          color: #111; 
          font-family: "Helvetica Neue", sans-serif; 
          font-size: 62px; 
          font-weight: normal; 
          letter-spacing: -1px; 
          line-height: 1; 
          text-align: center; 
        }

        h2 { 
          color: #111; 
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          font-size: 30px; 
          font-weight: 300; 
          line-height: 32px; 
          margin: 0 0 72px; 
          text-align: center; 
        }

        p { 
          color: #685206; 
          font-family: "Helvetica Neue", sans-serif; 
          font-size: 16px; 
          line-height: 24px; 
          margin: 0 0 24px; 
          text-align: justify; 
          text-justify: inter-word; 
        }

        .header {
          margin-top: 100px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
        }

        .summary-block {
          margin-left: 10%;
          margin-right: 10%;
        }

        .summary-block p {
          color: #373D3F;
          margin: 0;
          margin-top: 1%;
        }

        .summary-block h1 {
          text-align: left;
          color: #373D3F;
        }

        .contact {
          display: flex;
          justify-content: center;
          align-items: center;
          color: #FFF;
          background: #111111;
          width: 100%;
          min-height: 100vh;
        }

        .contact h2 {
          color: #FFF;
          margin-bottom: 10px;
        }

        .contact p {
          text-align: center;
          color: #D3D3D3;
          margin-top: 10px;
        }

        .contact div {
          width: 100%;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 15px;
        }

        .contact-links {
          display: flex;
          justify-content: center;
          gap: 30px;
          width: 100%;
          margin-top: 10px;
        }

        .f-ico {
          color: #FFF;
          transition: color 0.2s ease, transform 0.2s ease;
          display: inline-block;
          text-decoration: none;
        }

        .f-ico:hover {
          color: #39CCCC;
          transform: scale(1.1);
        }

        .footer {
          background: #111111;
          display: flex;
          justify-content: center;
          align-items: center;
          color: #778899;
          font-size: 12px;
          height: 10vh;
        }

        .circle-down {
          margin-top: 20%;
          height: 35px;
          width: 35px;
          background: url('/imgs/chev-circle-down.png') no-repeat center center;
          background-size: cover;
          cursor: pointer;
        }

        .circle-up {
          margin-top: 20%;
          height: 35px;
          width: 35px;
          background: url('/imgs/chev-circle-up.png') no-repeat center center;
          background-size: cover;
          cursor: pointer;
        }

        @keyframes bounce {
          0%, 100% { transform: translateY(-3px); }
          50% { transform: translateY(5px); }
        }

        .zio {
          position: absolute;
          margin: 0;
          bottom: 40px;
          z-index: 20;
          width: 40px;
          height: 40px;
          border-radius: 100%;
          animation: bounce 1s infinite ease-in-out;
        }
    </style>
</head>
<body>

  <section id="main" class="container">
    <div class="header">
      <h1><span class="wh">Daniel Persaud</span></h1>
      <div class="intro">
        <h2><span class="wh">Software Engineer, Amazonian, etc.</span></h2>
      </div>
    </div>
    <div id="c-down" class="circle-down zio"></div>
  </section>

  <section id="contact" class="contact">
    <div>
      <h2>drop me a line</h2>
      <hr style="width: 60px; border: 1px solid #FFF;"/>
      <div class="contact-links">
        <a href="https://github.com/persa188" target="_blank" rel="noopener" class="f-ico" aria-label="GitHub">
          <i class="fab fa-github fa-2x"></i>
        </a>
        <a href="https://www.linkedin.com/in/daniel-persaud-35164849/" target="_blank" rel="noopener" class="f-ico" aria-label="LinkedIn">
          <i class="fab fa-linkedin fa-2x"></i>
        </a>
        <a href="mailto:web+contact@dpsd.ca" class="f-ico" aria-label="Email">
          <i class="far fa-envelope fa-2x"></i>
        </a>
      </div>
    </div>
  </section>

  <section class="footer">
    <div>
      &copy; 2026 Daniel Persaud | made with <i class="fas fa-heart" style="color: #ff4d4d;"></i> in Toronto.
      &mdash; <a href="https://pp.dpsd.ca" style="color:#D3D3D3; text-decoration: none;">Privacy Policy</a>
    </div>
  </section>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const cDown = document.getElementById('c-down');
      const mainSection = document.getElementById('main');
      const contactSection = document.getElementById('contact');

      if (cDown && mainSection && contactSection) {
        
        cDown.addEventListener('click', function () {
          if (cDown.classList.contains('circle-up')) {
            mainSection.scrollIntoView({ behavior: 'smooth' });
          } else {
            contactSection.scrollIntoView({ behavior: 'smooth' });
          }
        });

        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              cDown.className = "circle-up zio";
            } else {
              cDown.className = "circle-down zio";
            }
          });
        }, {
          threshold: 0.4
        });

        observer.observe(contactSection);
      }
    });
  </script>

</body>
</html>
